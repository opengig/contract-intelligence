name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/deploy-server.yml'

env:
  APP_NAME: contract-server
  RESOURCE_GROUP: heizen-developers
  IMAGE_NAME: contract-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR login server
        id: acr
        run: |
          ACR_NAME=$(az acr list --resource-group ${{ env.RESOURCE_GROUP }} --query "[0].name" -o tsv)
          ACR_SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
          echo "name=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "server=$ACR_SERVER" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ steps.acr.outputs.server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -f apps/server/Dockerfile -t $IMAGE .
          docker push $IMAGE
          # Also tag as latest
          docker tag $IMAGE ${{ steps.acr.outputs.server }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ steps.acr.outputs.server }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure App Service
        run: |
          IMAGE=${{ steps.acr.outputs.server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          az webapp config container set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --container-image-name $IMAGE

      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
